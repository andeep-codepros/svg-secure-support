# CodePros SVG Secure Support — uploads directory hardening for nginx
#
# HOW TO USE:
#   Add these rules inside the `server {}` block of your nginx site config,
#   before the generic `location /` block.
#
#   On production servers this is typically:
#     /etc/nginx/sites-available/<your-site>.conf
#
#   In Local by Flywheel the per-site nginx config is at:
#     ~/Local Sites/<site-name>/conf/nginx/site.conf.hbs
#   Edit that file and restart the site from the Local app.
#
# ---------------------------------------------------------------------------

# 1. Block PHP execution inside the uploads directory.
#    Returns 403 if anyone tries to request a server-side script
#    that was uploaded (e.g. a .php file disguised as an SVG).
location ~* /wp-content/uploads/.*\.(php[0-9]?|phtml|phar|asp|aspx|jsp|cgi|pl|py|sh)$ {
    deny all;
}

# 2. Security headers on direct SVG file requests.
#    Mirrors what Headers::maybe_send_svg_headers() sends via PHP for
#    WordPress attachment pages, but applied at the nginx layer so
#    direct file access (bypassing WordPress) is also covered.
location ~* /wp-content/uploads/.*\.svgz?$ {
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'none'; object-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:;" always;
}
